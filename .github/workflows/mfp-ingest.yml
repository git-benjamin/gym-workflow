name: MFP Ingest

# NOTE: MFP is fronted by Cloudflare WAF which blocks all known datacenter IP
# ranges (including GitHub Actions runners) regardless of cookies / UA. This
# workflow returns 403 from Cloudflare before the request reaches MFP.
#
# Scheduled trigger is DISABLED to avoid daily failure emails. Kept manually
# triggerable for re-testing if MFP changes their bot policy or if running
# via a self-hosted runner on a residential IP.
#
# Realistic options for automated MFP ingestion:
#   1. Residential proxy in this workflow (paid; cheapest ~$5/mo)
#   2. Self-hosted GitHub runner on a residential IP
#   3. Local macOS launchd job running mfp_ingest.py on the laptop
#
# Until one of those is set up, MFP ingestion remains manual:
#   python health/training/scripts/mfp_ingest.py

on:
  # schedule:
  #   - cron: '0 22 * * *'   # disabled — see note above
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Start date (YYYY-MM-DD). Defaults to last 7 days.'
        required: false
      skip_weight:
        description: 'Skip weight ingest'
        required: false
        type: boolean
        default: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: health/training/scripts

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: health/training/scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ingest MFP data
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          MFP_COOKIES_JSON: ${{ secrets.MFP_COOKIES_JSON }}
        run: |
          ARGS=""
          START="${{ github.event.inputs.start_date }}"
          if [ -n "$START" ]; then
            ARGS="$ARGS --start-date $START"
          else
            ARGS="$ARGS --start-date $(date -d '7 days ago' +%Y-%m-%d 2>/dev/null || date -v-7d +%Y-%m-%d)"
          fi
          if [ "${{ github.event.inputs.skip_weight }}" = "true" ]; then
            ARGS="$ARGS --skip-weight"
          fi
          python mfp_ingest.py $ARGS
