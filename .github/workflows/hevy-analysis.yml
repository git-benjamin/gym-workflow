name: Hevy AI Analysis

on:
  workflow_run:
    workflows: ["Hevy Sync"]
    types: [completed]
  workflow_dispatch:
    inputs:
      workout_id:
        description: 'Specific workout ID to analyse (default: latest)'
        required: false
      force:
        description: 'Re-analyse even if already in analyses table'
        required: false
        type: boolean
        default: false

jobs:
  analyse:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    defaults:
      run:
        working-directory: health/training/scripts

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: health/training/scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Analyse new workouts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_BUCKET: ${{ secrets.SUPABASE_BUCKET }}
          SUPABASE_S3_ENDPOINT: ${{ secrets.SUPABASE_S3_ENDPOINT }}
          SUPABASE_S3_KEY: ${{ secrets.SUPABASE_S3_KEY }}
          SUPABASE_S3_SECRET: ${{ secrets.SUPABASE_S3_SECRET }}
          SUPABASE_S3_REGION: ${{ secrets.SUPABASE_S3_REGION }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL: benjamin_dang@outlook.com
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.workout_id }}" ]; then
            ARGS="$ARGS --workout-id ${{ github.event.inputs.workout_id }}"
          fi
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          python analyse.py $ARGS
