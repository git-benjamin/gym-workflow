name: Garmin Ingest

on:
  schedule:
    - cron: '0 21 * * *'   # 5am AWST = 21:00 UTC
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Start date (YYYY-MM-DD). Defaults to last 3 days.'
        required: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: health/training/scripts

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: health/training/scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ingest Garmin data
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GARMIN_OAUTH1_TOKEN: ${{ secrets.GARMIN_OAUTH1_TOKEN }}
          GARMIN_OAUTH2_TOKEN: ${{ secrets.GARMIN_OAUTH2_TOKEN }}
        run: |
          START="${{ github.event.inputs.start_date }}"
          if [ -n "$START" ]; then
            python garmin_ingest.py --start-date "$START"
          else
            python garmin_ingest.py --start-date $(date -d '3 days ago' +%Y-%m-%d 2>/dev/null || date -v-3d +%Y-%m-%d)
          fi
